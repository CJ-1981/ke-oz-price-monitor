name: Fetch flight prices

on:
  schedule:
    # 09:00 UTC every day = ~6 PM KST
    - cron: "0 9 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write  # required to commit prices.json back to the repo

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch prices and update data/prices.json
        env:
          DUFFEL_ACCESS_TOKEN: ${{ secrets.DUFFEL_ACCESS_TOKEN }}
          # Email alert config (all optional — alerts are skipped if GMAIL_* not set)
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
          ALERT_DROP_PCT: "5"
          ALERT_MIN_INTERVAL_H: "24"
        run: python scripts/fetch_prices.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Add files that exist; last_alert.json is only created when an
          # alert is actually sent (may be missing on no-drop days).
          for f in data/prices.json data/last_alert.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): daily price snapshot ($(date -u +%Y-%m-%d))"
            git push
          fi
          # Pushing to main auto-triggers a GitHub Pages rebuild when
          # Pages is configured as "Deploy from a branch".
